<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>00878 存股紀錄</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --success: #10b981;
            --success-dark: #059669;
            --danger: #ef4444;
            --danger-dark: #dc2626;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --card-shadow: 0 10px 40px rgba(0,0,0,0.15);
            --card-radius: 20px;
        }
        
        body {
            font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            padding: 20px;
            padding-bottom: 100px;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        
        /* 卡片基礎樣式 */
        .card {
            background: white;
            border-radius: var(--card-radius);
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: var(--card-shadow);
        }
        
        /* 登入區塊 */
        .auth-card {
            text-align: center;
            padding: 40px 24px;
        }

        .auth-card .stock-name {
            font-size: 28px;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 8px;
        }

        .auth-card .stock-code {
            font-size: 16px;
            color: #9ca3af;
            font-weight: 500;
            margin-bottom: 32px;
        }

        .google-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: white;
            border: 2px solid #e5e7eb;
            border-radius: 14px;
            padding: 14px 28px;
            font-size: 17px;
            font-weight: 600;
            color: #1f2937;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .google-btn:hover {
            border-color: var(--primary);
            box-shadow: 0 4px 16px rgba(99, 102, 241, 0.15);
            transform: translateY(-1px);
        }

        .google-btn:active {
            transform: translateY(0);
        }

        .google-btn img {
            width: 24px;
            height: 24px;
        }

        .auth-note {
            font-size: 13px;
            color: #9ca3af;
            margin-top: 20px;
            line-height: 1.6;
        }

        /* 使用者列 */
        .user-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 20px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
        }

        .user-name {
            font-size: 14px;
            font-weight: 600;
            color: #1f2937;
        }

        .logout-btn {
            background: none;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            padding: 8px 14px;
            font-size: 13px;
            font-weight: 500;
            color: #6b7280;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .logout-btn:hover {
            border-color: var(--danger);
            color: var(--danger);
            background: #fef2f2;
        }

        /* 同步狀態 */
        .sync-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #9ca3af;
            margin-left: 4px;
        }

        .sync-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--success);
        }

        .sync-dot.syncing {
            background: #f59e0b;
            animation: pulse 1s infinite;
        }

        .sync-dot.error {
            background: var(--danger);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* 標題卡片 */
        .header-card {
            text-align: center;
            padding: 20px 24px;
        }
        
        .stock-name {
            font-size: 22px;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 4px;
        }
        
        .stock-code {
            font-size: 15px;
            color: #9ca3af;
            font-weight: 500;
        }
        
        /* 股價卡片 */
        .price-card {
            text-align: center;
            padding: 28px 24px;
        }
        
        .price-label {
            font-size: 16px;
            color: #6b7280;
            margin-bottom: 12px;
            font-weight: 500;
        }
        
        .current-price {
            font-size: 56px;
            font-weight: 700;
            color: #1f2937;
            line-height: 1.1;
        }
        
        .price-unit {
            font-size: 22px;
            color: #9ca3af;
            margin-left: 4px;
            font-weight: 500;
        }
        
        .update-time {
            font-size: 13px;
            color: #9ca3af;
            margin-top: 14px;
        }
        
        /* 持股資訊 */
        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid #f3f4f6;
        }
        
        .info-row:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }
        
        .info-row:first-child {
            padding-top: 0;
        }
        
        .info-label {
            font-size: 16px;
            color: #6b7280;
            font-weight: 500;
        }
        
        .info-value {
            font-size: 20px;
            font-weight: 700;
            color: #1f2937;
        }
        
        /* 損益卡片 */
        .profit-card {
            padding: 28px 24px;
            text-align: center;
            color: white;
            transition: background 0.3s ease;
        }
        
        .profit-card.positive {
            background: linear-gradient(135deg, var(--success) 0%, var(--success-dark) 100%);
        }
        
        .profit-card.negative {
            background: linear-gradient(135deg, var(--danger) 0%, var(--danger-dark) 100%);
        }
        
        .profit-card.neutral {
            background: linear-gradient(135deg, #6b7280 0%, #4b5563 100%);
        }
        
        .profit-label {
            font-size: 18px;
            opacity: 0.9;
            margin-bottom: 10px;
            font-weight: 500;
        }
        
        .profit-value {
            font-size: 48px;
            font-weight: 700;
            line-height: 1.1;
        }
        
        .profit-rate {
            font-size: 22px;
            margin-top: 10px;
            opacity: 0.9;
            font-weight: 500;
        }
        
        .profit-note {
            font-size: 13px;
            margin-top: 14px;
            opacity: 0.7;
        }
        
        /* 買進紀錄區塊 */
        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        
        .history-title {
            font-size: 18px;
            font-weight: 700;
            color: #1f2937;
        }
        
        .add-btn {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 10px 16px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
            font-family: inherit;
        }
        
        .add-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }
        
        .add-btn:active {
            transform: translateY(0);
        }
        
        /* 交易紀錄項目 */
        .history-item {
            background: #f9fafb;
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 12px;
            position: relative;
            transition: all 0.2s ease;
        }
        
        .history-item:last-child {
            margin-bottom: 0;
        }
        
        .history-item:hover {
            background: #f3f4f6;
        }
        
        .history-main {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        
        .history-info {
            flex: 1;
        }
        
        .history-date {
            font-size: 14px;
            color: #9ca3af;
            margin-bottom: 6px;
            font-weight: 500;
        }
        
        .history-detail {
            font-size: 16px;
            color: #1f2937;
            font-weight: 600;
        }
        
        .history-price {
            color: #6b7280;
            font-weight: 500;
            margin-left: 8px;
        }
        
        .history-right {
            text-align: right;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
        }
        
        .single-pl {
            font-size: 18px;
            font-weight: 700;
        }
        
        .single-pl.positive {
            color: var(--success);
        }
        
        .single-pl.negative {
            color: var(--danger);
        }
        
        .single-pl.neutral {
            color: #6b7280;
        }
        
        .delete-btn {
            background: none;
            border: none;
            color: #d1d5db;
            cursor: pointer;
            padding: 4px;
            border-radius: 6px;
            transition: all 0.2s ease;
            font-size: 18px;
            line-height: 1;
        }
        
        .delete-btn:hover {
            color: var(--danger);
            background: #fee2e2;
        }
        
        .empty-state {
            text-align: center;
            padding: 32px 16px;
            color: #9ca3af;
        }
        
        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
        
        .empty-state-text {
            font-size: 15px;
            line-height: 1.5;
        }
        
        /* 更新按鈕 */
        .refresh-btn {
            width: 100%;
            padding: 18px;
            background: white;
            border: none;
            border-radius: var(--card-radius);
            font-size: 18px;
            font-weight: 600;
            color: var(--primary);
            cursor: pointer;
            box-shadow: var(--card-shadow);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s ease;
            font-family: inherit;
        }
        
        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 44px rgba(0,0,0,0.18);
        }
        
        .refresh-btn:active {
            transform: translateY(0);
        }
        
        .refresh-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .refresh-icon {
            font-size: 22px;
            transition: transform 0.3s ease;
        }
        
        .refresh-btn:not(:disabled):hover .refresh-icon {
            transform: rotate(180deg);
        }
        
        /* 狀態訊息 */
        .status-msg {
            text-align: center;
            color: white;
            font-size: 15px;
            margin-top: 16px;
            min-height: 24px;
            font-weight: 500;
        }
        
        /* 頁尾說明 */
        .footer-note {
            text-align: center;
            color: rgba(255,255,255,0.75);
            font-size: 13px;
            margin-top: 20px;
            line-height: 1.6;
        }
        
        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        .modal {
            background: white;
            border-radius: var(--card-radius);
            padding: 28px;
            width: 100%;
            max-width: 400px;
            transform: translateY(20px) scale(0.95);
            transition: all 0.3s ease;
        }
        
        .modal-overlay.active .modal {
            transform: translateY(0) scale(1);
        }
        
        .modal-title {
            font-size: 20px;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 24px;
            text-align: center;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #4b5563;
            margin-bottom: 8px;
        }
        
        .form-input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 16px;
            font-family: inherit;
            transition: all 0.2s ease;
            -webkit-appearance: none;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }
        
        .form-hint {
            font-size: 13px;
            color: #9ca3af;
            margin-top: 6px;
        }
        
        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 28px;
        }
        
        .modal-btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }
        
        .modal-btn.primary {
            background: var(--primary);
            color: white;
        }
        
        .modal-btn.primary:hover {
            background: var(--primary-dark);
        }
        
        .modal-btn.secondary {
            background: #f3f4f6;
            color: #4b5563;
        }
        
        .modal-btn.secondary:hover {
            background: #e5e7eb;
        }
        
        /* 確認刪除 Modal */
        .confirm-text {
            text-align: center;
            color: #4b5563;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 8px;
        }
        
        .confirm-detail {
            text-align: center;
            background: #f9fafb;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 8px;
        }
        
        .modal-btn.danger {
            background: var(--danger);
            color: white;
        }
        
        .modal-btn.danger:hover {
            background: var(--danger-dark);
        }

        /* Toast 通知 */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #1f2937;
            color: white;
            padding: 14px 24px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 1001;
            max-width: 90%;
            text-align: center;
        }
        
        .toast.show {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }

        /* Loading */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            transition: opacity 0.4s ease;
        }

        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-spinner {
            text-align: center;
            color: white;
        }

        .loading-spinner .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 16px;
            font-weight: 500;
        }

        /* 隱藏 */
        .hidden {
            display: none !important;
        }

        /* 資料遷移提示 */
        .migrate-card {
            background: #fffbeb;
            border: 2px solid #f59e0b;
            padding: 20px 24px;
            text-align: center;
        }

        .migrate-card .migrate-title {
            font-size: 16px;
            font-weight: 700;
            color: #92400e;
            margin-bottom: 8px;
        }

        .migrate-card .migrate-desc {
            font-size: 14px;
            color: #a16207;
            margin-bottom: 16px;
            line-height: 1.5;
        }

        .migrate-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .migrate-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s ease;
        }

        .migrate-btn.yes {
            background: #f59e0b;
            color: white;
        }

        .migrate-btn.no {
            background: #f3f4f6;
            color: #6b7280;
        }
    </style>
</head>
<body>
    <!-- Loading -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner">
            <div class="spinner"></div>
            <div class="loading-text">載入中...</div>
        </div>
    </div>

    <div class="container">
        <!-- 登入畫面 -->
        <div id="authScreen" class="hidden">
            <div class="card auth-card">
                <div class="stock-name">國泰永續高股息</div>
                <div class="stock-code">00878 存股紀錄</div>
                <button class="google-btn" onclick="signInWithGoogle()">
                    <svg width="24" height="24" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                    使用 Google 帳號登入
                </button>
                <div class="auth-note">
                    登入後資料自動同步到雲端<br>
                    換裝置也能存取紀錄
                </div>
            </div>
        </div>

        <!-- 主畫面 -->
        <div id="mainScreen" class="hidden">
            <!-- 使用者列 -->
            <div class="card user-bar">
                <div class="user-info">
                    <img class="user-avatar" id="userAvatar" src="" alt="">
                    <span class="user-name" id="userName"></span>
                    <span class="sync-indicator">
                        <span class="sync-dot" id="syncDot"></span>
                        <span id="syncText">已同步</span>
                    </span>
                </div>
                <button class="logout-btn" onclick="signOutUser()">登出</button>
            </div>

            <!-- 資料遷移提示 -->
            <div class="card migrate-card hidden" id="migrateCard">
                <div class="migrate-title">📦 發現本機舊資料</div>
                <div class="migrate-desc">偵測到瀏覽器中有之前的買進紀錄，要匯入到雲端嗎？</div>
                <div class="migrate-actions">
                    <button class="migrate-btn yes" onclick="migrateData()">匯入到雲端</button>
                    <button class="migrate-btn no" onclick="skipMigrate()">不用了</button>
                </div>
            </div>

            <!-- 標題 -->
            <div class="card header-card">
                <div class="stock-name">國泰永續高股息</div>
                <div class="stock-code">00878</div>
            </div>
            
            <!-- 目前股價 -->
            <div class="card price-card">
                <div class="price-label">📈 目前股價</div>
                <div>
                    <span class="current-price" id="currentPrice">--</span>
                    <span class="price-unit">元</span>
                </div>
                <div class="update-time" id="updateTime">尚未更新</div>
            </div>
            
            <!-- 持股資訊 -->
            <div class="card" id="infoCard">
                <div class="info-row">
                    <span class="info-label">📦 持有張數</span>
                    <span class="info-value" id="totalShares">0 張</span>
                </div>
                <div class="info-row">
                    <span class="info-label">💰 總成本</span>
                    <span class="info-value" id="totalCost">0 元</span>
                </div>
                <div class="info-row">
                    <span class="info-label">🏷️ 平均買價</span>
                    <span class="info-value" id="avgPrice">0 元</span>
                </div>
                <div class="info-row">
                    <span class="info-label">💵 目前市值</span>
                    <span class="info-value" id="marketValue">0 元</span>
                </div>
            </div>
            
            <!-- 損益 -->
            <div class="card profit-card neutral" id="profitCard">
                <div class="profit-label">💹 目前損益</div>
                <div class="profit-value" id="profitValue">0 元</div>
                <div class="profit-rate" id="profitRate">報酬率 0%</div>
                <div class="profit-note">＊已扣除預估手續費與交易稅</div>
            </div>
            
            <!-- 買進紀錄 -->
            <div class="card">
                <div class="history-header">
                    <div class="history-title">📝 買進紀錄</div>
                    <button class="add-btn" onclick="openAddModal()">
                        <span>＋</span>
                        <span>新增</span>
                    </button>
                </div>
                <div id="historyList"></div>
            </div>
            
            <!-- 更新按鈕 -->
            <button class="refresh-btn" id="refreshBtn" onclick="fetchPrice()">
                <span class="refresh-icon">🔄</span>
                <span>更新股價</span>
            </button>
            
            <div class="status-msg" id="statusMsg"></div>
            
            <div class="footer-note">
                資料已同步至 Firebase 雲端<br>
                換裝置登入即可存取
            </div>
        </div>
    </div>
    
    <!-- 新增買進 Modal -->
    <div class="modal-overlay" id="addModal">
        <div class="modal">
            <div class="modal-title">新增買進紀錄</div>
            <div class="form-group">
                <label class="form-label">買進日期</label>
                <input type="date" class="form-input" id="inputDate">
            </div>
            <div class="form-group">
                <label class="form-label">買進價格（元）</label>
                <input type="number" class="form-input" id="inputPrice" placeholder="例如：21.35" step="0.01" min="0">
            </div>
            <div class="form-group">
                <label class="form-label">買進張數</label>
                <input type="number" class="form-input" id="inputShares" placeholder="例如：1" min="1" value="1">
                <div class="form-hint">1 張 = 1000 股</div>
            </div>
            <div class="modal-actions">
                <button class="modal-btn secondary" onclick="closeAddModal()">取消</button>
                <button class="modal-btn primary" onclick="addTransaction()">確認新增</button>
            </div>
        </div>
    </div>
    
    <!-- 確認刪除 Modal -->
    <div class="modal-overlay" id="deleteModal">
        <div class="modal">
            <div class="modal-title">確認刪除</div>
            <div class="confirm-text">確定要刪除這筆買進紀錄嗎？</div>
            <div class="confirm-detail" id="deleteDetail"></div>
            <div class="modal-actions">
                <button class="modal-btn secondary" onclick="closeDeleteModal()">取消</button>
                <button class="modal-btn danger" onclick="confirmDelete()">確認刪除</button>
            </div>
        </div>
    </div>
    
    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

    <script>
        // =============================================================
        // ★★★ Firebase 設定 ★★★
        // 請將下方替換為你自己的 Firebase 專案設定
        // =============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyDpPZgtT-4Xx6uiw4CkkVipY1UA_QQYvEI",
            authDomain: "stock-tracker-00878.firebaseapp.com",
            projectId: "stock-tracker-00878",
            storageBucket: "stock-tracker-00878.firebasestorage.app",
            messagingSenderId: "207716790033",
            appId: "1:207716790033:web:bac1d4cd893d11855be6b0"
        };

        // 初始化 Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // ===== 常數設定 =====
        const FEE_RATE = 0.001425;
        const TAX_RATE = 0.001;
        const OLD_STORAGE_KEY = '00878_transactions';
        const OLD_PRICE_KEY = '00878_lastPrice';
        const OLD_UPDATE_KEY = '00878_lastUpdate';

        // ===== 狀態 =====
        let transactions = [];
        let currentPrice = 0;
        let deleteDocId = null;
        let currentUser = null;
        let unsubscribe = null;  // Firestore 即時監聽

        // ===== 認證 =====
        function signInWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).catch(err => {
                console.error('登入失敗:', err);
                if (err.code === 'auth/popup-blocked') {
                    // fallback to redirect
                    auth.signInWithRedirect(provider);
                } else {
                    showToast('❌ 登入失敗：' + err.message);
                }
            });
        }

        function signOutUser() {
            if (unsubscribe) {
                unsubscribe();
                unsubscribe = null;
            }
            auth.signOut();
        }

        // 監聽登入狀態
        auth.onAuthStateChanged(user => {
            const loading = document.getElementById('loadingOverlay');
            
            if (user) {
                currentUser = user;
                document.getElementById('authScreen').classList.add('hidden');
                document.getElementById('mainScreen').classList.remove('hidden');
                
                // 顯示使用者資訊
                document.getElementById('userAvatar').src = user.photoURL || '';
                document.getElementById('userName').textContent = user.displayName || user.email;
                
                // 開始監聽 Firestore
                startListening();
                
                // 檢查是否有舊資料要遷移
                checkMigration();
                
                // 取得股價
                fetchPrice();
            } else {
                currentUser = null;
                transactions = [];
                currentPrice = 0;
                
                if (unsubscribe) {
                    unsubscribe();
                    unsubscribe = null;
                }
                
                document.getElementById('authScreen').classList.remove('hidden');
                document.getElementById('mainScreen').classList.add('hidden');
            }
            
            loading.classList.add('hidden');
        });

        // ===== Firestore 即時監聽 =====
        function startListening() {
            if (!currentUser) return;

            setSyncStatus('syncing');
            
            const userDoc = db.collection('users').doc(currentUser.uid);
            
            // 監聽交易紀錄
            unsubscribe = userDoc.collection('transactions')
                .orderBy('date', 'desc')
                .onSnapshot(snapshot => {
                    transactions = snapshot.docs.map(doc => ({
                        id: doc.id,
                        ...doc.data()
                    }));
                    renderAll();
                    setSyncStatus('synced');
                }, err => {
                    console.error('監聽失敗:', err);
                    setSyncStatus('error');
                });

            // 讀取上次股價
            userDoc.get().then(doc => {
                if (doc.exists) {
                    const data = doc.data();
                    if (data.lastPrice) {
                        currentPrice = data.lastPrice;
                        renderAll();
                    }
                    if (data.lastUpdate) {
                        document.getElementById('updateTime').textContent = '更新時間：' + data.lastUpdate;
                    }
                }
            });
        }

        function setSyncStatus(status) {
            const dot = document.getElementById('syncDot');
            const text = document.getElementById('syncText');
            dot.className = 'sync-dot';
            
            if (status === 'synced') {
                text.textContent = '已同步';
            } else if (status === 'syncing') {
                dot.classList.add('syncing');
                text.textContent = '同步中';
            } else {
                dot.classList.add('error');
                text.textContent = '同步失敗';
            }
        }

        // ===== 資料遷移 =====
        function checkMigration() {
            const oldData = localStorage.getItem(OLD_STORAGE_KEY);
            if (oldData) {
                const parsed = JSON.parse(oldData);
                if (parsed.length > 0) {
                    document.getElementById('migrateCard').classList.remove('hidden');
                }
            }
        }

        async function migrateData() {
            const oldData = JSON.parse(localStorage.getItem(OLD_STORAGE_KEY) || '[]');
            if (oldData.length === 0) return;

            setSyncStatus('syncing');
            showToast('⏳ 正在匯入資料...');

            try {
                const batch = db.batch();
                const txnRef = db.collection('users').doc(currentUser.uid).collection('transactions');

                for (const t of oldData) {
                    const docRef = txnRef.doc();
                    batch.set(docRef, {
                        date: t.date,
                        price: t.price,
                        shares: t.shares,
                        cost: t.cost,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }

                await batch.commit();

                // 清除舊資料
                localStorage.removeItem(OLD_STORAGE_KEY);
                localStorage.removeItem(OLD_PRICE_KEY);
                localStorage.removeItem(OLD_UPDATE_KEY);

                document.getElementById('migrateCard').classList.add('hidden');
                showToast(`✅ 已匯入 ${oldData.length} 筆紀錄到雲端`);
            } catch (err) {
                console.error('遷移失敗:', err);
                showToast('❌ 匯入失敗，請稍後再試');
                setSyncStatus('error');
            }
        }

        function skipMigrate() {
            document.getElementById('migrateCard').classList.add('hidden');
            localStorage.removeItem(OLD_STORAGE_KEY);
            localStorage.removeItem(OLD_PRICE_KEY);
            localStorage.removeItem(OLD_UPDATE_KEY);
        }

        // ===== 格式化工具 =====
        function formatNumber(num) {
            return Math.round(num).toLocaleString('zh-TW');
        }
        
        function formatDateTime(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            const h = String(date.getHours()).padStart(2, '0');
            const min = String(date.getMinutes()).padStart(2, '0');
            return `${y}/${m}/${d} ${h}:${min}`;
        }
        
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
            const w = weekdays[date.getDay()];
            return `${y}/${m}/${d}（週${w}）`;
        }
        
        // ===== 計算邏輯 =====
        function calcSummary() {
            const totalShares = transactions.reduce((sum, t) => sum + t.shares, 0);
            const totalCost = transactions.reduce((sum, t) => sum + t.cost, 0);
            const avgPrice = totalShares > 0 ? totalCost / totalShares : 0;
            const marketValue = totalShares * currentPrice;
            
            const sellFee = Math.floor(marketValue * FEE_RATE);
            const sellTax = Math.floor(marketValue * TAX_RATE);
            const sellCost = sellFee + sellTax;
            
            const profit = marketValue - totalCost - sellCost;
            const profitRate = totalCost > 0 ? (profit / totalCost) * 100 : 0;
            
            return { totalShares, totalCost, avgPrice, marketValue, profit, profitRate };
        }
        
        function calcSinglePL(transaction) {
            return (currentPrice - transaction.price) * transaction.shares;
        }
        
        // ===== 畫面渲染 =====
        function renderAll() {
            renderSummary();
            renderHistory();
        }
        
        function renderSummary() {
            const summary = calcSummary();
            
            document.getElementById('currentPrice').textContent = currentPrice > 0 ? currentPrice.toFixed(2) : '--';
            document.getElementById('totalShares').textContent = (summary.totalShares / 1000) + ' 張';
            document.getElementById('totalCost').textContent = formatNumber(summary.totalCost) + ' 元';
            document.getElementById('avgPrice').textContent = summary.avgPrice > 0 ? summary.avgPrice.toFixed(2) + ' 元' : '0 元';
            document.getElementById('marketValue').textContent = formatNumber(summary.marketValue) + ' 元';
            
            const profitCard = document.getElementById('profitCard');
            const isPositive = summary.profit > 0;
            const isNegative = summary.profit < 0;
            
            profitCard.classList.remove('positive', 'negative', 'neutral');
            if (summary.totalShares === 0 || currentPrice === 0) {
                profitCard.classList.add('neutral');
            } else if (isPositive) {
                profitCard.classList.add('positive');
            } else if (isNegative) {
                profitCard.classList.add('negative');
            } else {
                profitCard.classList.add('neutral');
            }
            
            const sign = isPositive ? '+' : '';
            document.getElementById('profitValue').textContent = sign + formatNumber(summary.profit) + ' 元';
            document.getElementById('profitRate').textContent = '報酬率 ' + sign + summary.profitRate.toFixed(2) + '%';
        }
        
        function renderHistory() {
            const container = document.getElementById('historyList');
            
            if (transactions.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📋</div>
                        <div class="empty-state-text">尚無買進紀錄<br>點擊「新增」開始記錄</div>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = transactions.map(t => {
                const pl = calcSinglePL(t);
                const plClass = pl > 0 ? 'positive' : (pl < 0 ? 'negative' : 'neutral');
                const plSign = pl > 0 ? '+' : '';
                const plText = currentPrice > 0 ? `${plSign}${formatNumber(pl)} 元` : '計算中...';
                
                return `
                    <div class="history-item">
                        <div class="history-main">
                            <div class="history-info">
                                <div class="history-date">${formatDate(t.date)}</div>
                                <div class="history-detail">
                                    買 ${t.shares / 1000} 張
                                    <span class="history-price">@ ${t.price.toFixed(2)} 元</span>
                                </div>
                            </div>
                            <div class="history-right">
                                <button class="delete-btn" onclick="openDeleteModal('${t.id}')" title="刪除">✕</button>
                                <div class="single-pl ${plClass}">${plText}</div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // ===== 新增交易 =====
        function openAddModal() {
            document.getElementById('addModal').classList.add('active');
            document.getElementById('inputDate').value = new Date().toISOString().split('T')[0];
            document.getElementById('inputPrice').value = '';
            document.getElementById('inputShares').value = '1';
            document.getElementById('inputPrice').focus();
        }
        
        function closeAddModal() {
            document.getElementById('addModal').classList.remove('active');
        }
        
        async function addTransaction() {
            const date = document.getElementById('inputDate').value;
            const price = parseFloat(document.getElementById('inputPrice').value);
            const shares = parseInt(document.getElementById('inputShares').value) * 1000;
            
            if (!date) { showToast('請選擇買進日期'); return; }
            if (!price || price <= 0) { showToast('請輸入有效的買進價格'); return; }
            if (!shares || shares <= 0) { showToast('請輸入有效的買進張數'); return; }
            
            const grossCost = price * shares;
            const fee = Math.floor(grossCost * FEE_RATE);
            const cost = grossCost + fee;

            setSyncStatus('syncing');
            
            try {
                await db.collection('users').doc(currentUser.uid)
                    .collection('transactions').add({
                        date,
                        price,
                        shares,
                        cost,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                
                closeAddModal();
                showToast('✅ 已新增買進紀錄');
            } catch (err) {
                console.error('新增失敗:', err);
                showToast('❌ 新增失敗，請稍後再試');
                setSyncStatus('error');
            }
        }
        
        // ===== 刪除交易 =====
        function openDeleteModal(docId) {
            deleteDocId = docId;
            const t = transactions.find(t => t.id === docId);
            if (!t) return;
            
            document.getElementById('deleteDetail').innerHTML = `
                <div>${formatDate(t.date)}</div>
                <div style="margin-top:4px;font-weight:600;">買 ${t.shares / 1000} 張 @ ${t.price.toFixed(2)} 元</div>
            `;
            document.getElementById('deleteModal').classList.add('active');
        }
        
        function closeDeleteModal() {
            document.getElementById('deleteModal').classList.remove('active');
            deleteDocId = null;
        }
        
        async function confirmDelete() {
            if (!deleteDocId) return;

            setSyncStatus('syncing');
            
            try {
                await db.collection('users').doc(currentUser.uid)
                    .collection('transactions').doc(deleteDocId).delete();
                showToast('🗑️ 已刪除紀錄');
            } catch (err) {
                console.error('刪除失敗:', err);
                showToast('❌ 刪除失敗');
                setSyncStatus('error');
            }
            
            closeDeleteModal();
        }
        
        // ===== 股價更新 =====
        async function fetchPrice() {
            const btn = document.getElementById('refreshBtn');
            const status = document.getElementById('statusMsg');
            
            btn.disabled = true;
            status.textContent = '正在更新股價...';

            const proxies = [
                (url) => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
                (url) => `https://corsproxy.io/?${encodeURIComponent(url)}`,
                (url) => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`
            ];
            
            const targetUrl = 'https://tw.stock.yahoo.com/quote/00878.TW';
            let success = false;

            for (let i = 0; i < proxies.length && !success; i++) {
                try {
                    status.textContent = `正在更新股價... (${i + 1}/${proxies.length})`;
                    
                    const response = await fetch(proxies[i](targetUrl), {
                        signal: AbortSignal.timeout(10000)
                    });
                    const html = await response.text();
                    
                    const priceMatch = html.match(/"regularMarketPrice":(\d+\.?\d*)/);
                    
                    if (priceMatch && priceMatch[1]) {
                        currentPrice = parseFloat(priceMatch[1]);
                        
                        // 存到 Firestore
                        if (currentUser) {
                            const now = new Date();
                            const timeStr = formatDateTime(now);
                            await db.collection('users').doc(currentUser.uid).set({
                                lastPrice: currentPrice,
                                lastUpdate: timeStr
                            }, { merge: true });
                            document.getElementById('updateTime').textContent = '更新時間：' + timeStr;
                        }
                        
                        renderAll();
                        status.textContent = '✅ 股價已更新';
                        setTimeout(() => { status.textContent = ''; }, 3000);
                        success = true;
                    }
                } catch (error) {
                    console.log(`代理 ${i + 1} 失敗:`, error.message);
                }
            }

            if (!success) {
                if (currentPrice > 0) {
                    status.textContent = '⚠️ 無法更新，顯示上次股價';
                } else {
                    status.textContent = '❌ 更新失敗，請稍後再試';
                }
            }
            
            btn.disabled = false;
        }
        
        // ===== Toast =====
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }
        
        // ===== 點擊外部關閉 Modal =====
        document.querySelectorAll('.modal-overlay').forEach(overlay => {
            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) {
                    overlay.classList.remove('active');
                }
            });
        });
    </script>
</body>
</html>
